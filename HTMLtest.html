<!-- HTML Set Up-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubSync</title>

<!-- Linking-->
<link rel="stylesheet" href="CSStest.css">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="script.js"></script>

<!-- Title Header Creation-->
</head>
<body>

    <header class="app-header" id="top">
      <nav class="nav-bar">
        <div class="nav-left">
          <img src=AppLogo.png>
          <div class="appName">SubSync</div>
        </div>

        <div class="nav-center">
          <!-- href links to a id of an element -->
          <a href="#dashboard" class="nav-link">Dashboard</a>
          <a href="#insights" class="nav-link">Insights</a>
          <a href="#ai-advisor" class="nav-link">AI Advisor</a>
        </div>

        <div class="nav-right">
          <button class="btn" id="openAddModalNav">Add Subscription</button>
          <!-- <button class="btn btn-primary btn-small" id="openAddModalNav">Add Subscription</button> -->
        </div>

        <div class = "header-main"></div>
      </nav>
    </header>

  <section class="intro-section">
    <div class="intro-text">
      <h1>Your <span> Solution </span> to Lost Subscriptions. </h1>

      <div class="intro-buttons">
        <button class="btn" id="addBtn">+ Add Subscription</button>
        <a href="#dashboard" class="btn btn-outline">View Dashboard</a>
      </div>
    </div>

    <div class="dashboard-summary">
      <div class="data-preview">
        <div class="preview-card">
            <span class="preview-title">Monthly Spending</span>
            <span class="preview-total">**INSERT MONTHLY SPEND VARIABLE</span>

        </div>
        
      </div>
    </div>

  </section>

</main>
 <footer class="app-footer">
    <p>SubSync keeps your renewals visible so surprises don’t hit your balance.</p>
  </footer>

</body>
</html>
